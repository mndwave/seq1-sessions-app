<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0c0a09">
<title>SEQ1 Sessions — offline</title>
<style>
  :root {
    --bg: #0c0a09;
    --panel: #1c1917;
    --border: #292524;
    --teal: #5eead4;
    --teal-dim: #2dd4bf;
    --text: #e7e5e4;
    --muted: #78716c;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    height: 100%;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .frame {
    width: 100%;
    max-width: 420px;
    padding: 24px;
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: 4px;
    box-shadow: 0 0 0 1px rgba(94, 234, 212, 0.04) inset;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--teal);
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
    margin-bottom: 18px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 8px var(--teal-dim);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.35; }
    50%      { opacity: 1; }
  }
  h1 {
    font-size: 15px;
    font-weight: 400;
    margin: 0 0 8px;
    color: var(--text);
    letter-spacing: 0.04em;
  }
  p {
    font-size: 13px;
    line-height: 1.55;
    color: var(--muted);
    margin: 0 0 20px;
  }
  .lines {
    border-top: 1px dashed var(--border);
    padding-top: 14px;
    margin-bottom: 20px;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
  }
  .lines span { color: var(--teal-dim); }
  button {
    width: 100%;
    padding: 12px 16px;
    background: transparent;
    color: var(--teal);
    border: 1px solid var(--teal);
    border-radius: 2px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 120ms ease, color 120ms ease;
  }
  button:active {
    background: var(--teal);
    color: var(--bg);
  }
  button[disabled] {
    opacity: 0.5;
    pointer-events: none;
  }
  .status {
    margin-top: 14px;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    min-height: 14px;
  }
  .cursor::after {
    content: '_';
    margin-left: 2px;
    animation: blink 1s steps(1) infinite;
    color: var(--teal);
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
  <div class="frame" role="alert" aria-live="polite">
    <div class="header">
      <span class="dot" aria-hidden="true"></span>
      <span>SEQ1 / no connection</span>
    </div>
    <h1>offline<span class="cursor" aria-hidden="true"></span></h1>
    <p>The session shell can't reach <strong style="color:var(--text)">sessions.seq1.net</strong>. Check your network and retry — your work is preserved server-side.</p>
    <div class="lines">
      <div>&gt; ping <span>sessions.seq1.net</span></div>
      <div>&gt; <span id="diag">network unreachable</span></div>
    </div>
    <button id="retry" type="button">Retry connection</button>
    <div class="status" id="status">&nbsp;</div>
  </div>

<script>
(function () {
  var TARGET = 'https://sessions.seq1.net/';
  var btn = document.getElementById('retry');
  var status = document.getElementById('status');
  var diag = document.getElementById('diag');
  var retrying = false;

  function setStatus(msg) { status.textContent = msg || ' '; }

  function updateDiag() {
    diag.textContent = navigator.onLine ? 'link up — retrying' : 'network unreachable';
  }

  function attemptReload() {
    if (retrying) return;
    retrying = true;
    btn.disabled = true;
    setStatus('reconnecting…');
    // Small delay so the user sees feedback even on instant success.
    setTimeout(function () {
      window.location.replace(TARGET);
    }, 350);
  }

  btn.addEventListener('click', attemptReload);

  // Auto-retry the moment Android reports the network is back.
  window.addEventListener('online', function () {
    updateDiag();
    setStatus('connection restored');
    attemptReload();
  });
  window.addEventListener('offline', updateDiag);

  // Background poll: some Android builds don't fire 'online' reliably.
  setInterval(function () {
    if (!retrying && navigator.onLine) attemptReload();
  }, 3000);

  updateDiag();
})();
</script>
</body>
</html>
